<div class="side-pane-with-status-bar">
    <div class="card">
        <div class="card-header">Parameters</div>
        <div class="card-body">
            <!-- Show/Hide images -->
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="show-images"
                    autocomplete="off"
                />
                <label class="form-check-label" for="show-images">Show images</label>
            </div>

            <!-- Show/Hide origins -->
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="show-origins"
                    autocomplete="off"
                />
                <label class="form-check-label" for="show-origins">Show origins</label>
            </div>

            <!-- Show/Hide wireframes -->
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="show-wireframes"
                    autocomplete="off"
                />
                <label class="form-check-label" for="show-wireframes">Show wireframes</label>
            </div>
        </div>
    </div>
</div>
