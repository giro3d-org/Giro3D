---
title: Flight
shortdesc: Fly a camera over a GeoJSON line
tags: [camera, animation, geojson]
---

<div class="side-pane-with-status-bar">
    <div
        id="minimap"
        class="card m-1"
        style="
            width: 20rem;
            height: 14rem;
            overflow: hidden;
            border-radius: var(--bs-card-border-radius);
        "
    ></div>

    <div class="card">
        <div class="card-header">Animation</div>
        <div class="card-body">
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="toggle-animation"
                    autocomplete="off"
                />
                <label class="form-check-label" for="toggle-animation">Play animation</label>
            </div>

            <label for="animation-step" class="form-label">Animation step</label>
            <div class="input-group">
                <input
                    type="range"
                    min="0"
                    max="1"
                    value="0"
                    step="0.01"
                    class="form-range"
                    id="animation-step"
                    autocomplete="off"
                />
            </div>
        </div>
    </div>
</div>
