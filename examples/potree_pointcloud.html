---
title: Potree Point Cloud
shortdesc: Display a Potree point cloud.
attribution: © <a target="_blank" href="https://potree.github.io/">Potree</a>
tags: [potree, 'point cloud']
---

<div class="side-pane-with-status-bar">
    <div class="card">
        <div class="card-header">Parameters</div>
        <div class="card-body">
            <!-- EDL toggle -->
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="edl"
                    autocomplete="off"
                />
                <label class="form-check-label" for="edl">Eye dome lighting</label>
            </div>

            <!-- Inpainting toggle -->
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    checked="true"
                    role="switch"
                    id="inpainting"
                    autocomplete="off"
                />
                <label class="form-check-label" for="inpainting">Inpainting</label>
            </div>

            <!-- Point size slider -->
            <div class="row mt-2">
                <div class="col-auto">
                    <label for="size" style="width: 8rem" id="size-label" class="form-label"
                        >Point size: 4</label
                    >
                </div>
                <div class="col">
                    <input
                        type="range"
                        min="0"
                        max="20"
                        step="1"
                        value="4"
                        class="form-range"
                        id="size"
                        autocomplete="off"
                    />
                </div>
            </div>
        </div>
    </div>
</div>
